name: Run UI Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        id: tests
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          MAILSAC_API_KEY: ${{ secrets.MAILSAC_API_KEY }}
        run: npm run test:ui

      - name: Publish UI report
        run: |
          rm -rf public/ui-report
          [ -d reports/ui ] && cp -r reports/ui public/ui-report || true

      - name: Write deploy marker
        run: |
          echo "{\"timestamp\": $(date +%s%3N), \"type\": \"ui\"}" > public/last-updated.json

      - name: Commit and push
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull latest first so runs.json is up to date before we append
          git pull --rebase --autostash origin main
          # Append this run to the freshly pulled runs.json
          node scripts/update-runs.js ui "$TEST_OUTCOME"
          git add public/ui-report public/runs.json public/last-updated.json
          git diff --staged --quiet || git commit -m "chore: update UI test report [skip ci]"
          # Retry push once in case of a concurrent push
          git push || (git pull --rebase origin main && git push)
